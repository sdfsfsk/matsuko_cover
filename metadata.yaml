name: astrbot_plugin_matsuko_cover
desc: 🐱 猫猫翻唱插件（支持LLM工具调用、QQ音乐、偏好学习、批量翻唱、F0音高算法配置）
help: |-
  # 🐱 猫猫翻唱插件 v2.5.1
  
  ## ✨ 核心特性
  - 🔍 **智能搜索** - 自动搜索网易云音乐
  - 🎤 **一键翻唱** - 只需说歌名即可完成全部流程
  - 🧠 **偏好学习** - 记住你的喜好，越用越智能
  - 📦 **批量处理** - 一次翻唱多首歌曲
  - ⚙️ **灵活配置** - 所有功能均可开关控制
  
  ---
  
  ## 📋 传统命令（LLM强制模式下禁用）
  
  | 命令 | 说明 | 权限 |
  |------|------|------|
  | `/rvc <歌名> [升降调]` | 使用RVC模型翻唱歌曲 | 所有人 |
  | `/svc <歌名> [升降调]` | 使用SVC模型翻唱歌曲 | 所有人 |
  | `/刷新rvc模型` | 刷新RVC模型列表 | 所有人 |
  | `/刷新svc模型` | 刷新SVC模型列表 | 所有人 |
  | `/设置rvc后端链接 <URL>` | 设置RVC后端地址 | 管理员 |
  | `/设置svc后端链接 <URL>` | 设置SVC后端地址 | 管理员 |
  | `/我的翻唱统计` | 查看个人使用统计 | 所有人 |
  
  > 💡 **提示**：开启 `llm_force_mode` 后，/rvc 和 /svc 命令将被禁用，请通过对话让 LLM 自动调用工具。
  
  ---
  
  ## 🤖 LLM 工具调用（Function Calling）
  
  本插件支持 LLM 自动调用以下 **12个** 工具：
  
  ### 🔍 基础工具
  
  #### search_music - 搜索歌曲
  **参数：**
  - keyword (string): 搜索关键词（必填）
  - limit (number): 返回数量，默认5，最大10
  
  **示例：** "帮我搜索一下周杰伦的歌"
  
  ---
  
  #### rvc_cover - RVC翻唱
  **参数：**
  - song_name (string): 歌曲名称（必填）
  - model_index (number): 模型序号，默认1
  - key_shift (number): 音调调整(-12~12)，默认0
  
  **示例：** "用RVC第3个模型帮我翻唱《晴天》，升2调"
  
  ---
  
  #### svc_cover - SVC翻唱
  **参数：**
  - song_name (string): 歌曲名称（必填）
  - model_index (number): 模型序号，默认1
  - key_shift (number): 音调调整(-12~12)，默认0
  
  **示例：** "用SVC模型的第2个模型翻唱《稻香》"
  
  ---
  
  #### get_available_models - 查看模型列表
  **参数：**
  - api_type (string): 'rvc'、'svc' 或 'all'，默认'all'
  
  **示例：** "查看一下有哪些可用的模型"
  
  ---
  
  ### ⚡ 方案A：智能单步翻唱（推荐！）
  
  #### smart_cover - 一键智能翻唱 ⭐
  **最高效的翻唱方式！自动完成搜索+选择+翻唱全流程。**
  
  **参数：**
  - song_name (string): 歌曲名称（必填）
  - api_type (string, 可选): 'rvc' 或 'svc'，不指定则自动选择（LLM会根据可用引擎智能判断）
  - model_index (number, 可选): 模型序号，不指定则使用偏好或默认值
  - key_shift (number, 可选): 音调调整，不指定则使用偏好或默认值
  
  **示例：**
  - "翻唱《最炫民族风》" → 自动完成所有步骤！
  - "用SVC翻唱《荷塘月色》" → 指定类型
  - "用第4个模型翻唱《七里香》，升2调" → 完全自定义
  - "用RVC模型翻唱《晴天》" → LLM自主选择RVC引擎
  
  ---
  
  ### 🔄 方案C：确认机制
  
  #### confirm_selection - 确认选择
  **支持自然语言交互：'就这个'、'换一个'、'确定'、'取消'**
  
  **参数：**
  - selection_type (string): 'song'(歌曲)、'model'(模型)、'config'(配置)
  - selection_data (string): 当前选择的描述信息
  - action (string): 'confirm'(确认)、'change'(更换)、'cancel'(取消)、'info'(详情)
  
  **示例：**
  - 用户："就这个" → LLM调用 confirm_selection(song, data, confirm)
  - 用户："换一个" → LLM调用 confirm_selection(model, data, change)
  
  ---
  
  ### 📦 方案D：批量翻唱
  
  #### batch_cover - 批量翻唱
  **一次请求翻唱整个歌单！**
  
  **参数：**
  - songs (list[string]): 歌曲名称列表（必填）
  - api_type (string, 可选): 翻唱类型
  - model_index (number, 可选): 统一使用的模型序号
  - key_shift (number, 可选): 统一的音调调整值
  
  **示例：**
  - "帮我翻唱这三首歌：《晴天》《稻香》《七里香》"
  - "用SVC批量翻唱《A》《B》《C》《D》《E》"
  
  > ⚠️ 单次最多翻唱 {max_batch_size} 首（可在配置中修改）
  
  ---
  
  ### 🧠 方案E：偏好学习与推荐系统
  
  #### save_preference - 保存偏好设置
  **让 AI 记住你的常用配置！**
  
  **参数：**
  - preference_type (string): 
    - 'api_type': 默认翻唱类型 ('rvc' 或 'svc')
    - 'model_index': 默认模型序号 (数字≥1)
    - 'key_shift': 默认音调调整 (-12到12)
  - value (Any): 偏好值
  
  **示例：**
  - "以后都用SVC翻唱" → save_preference('api_type', 'svc')
  - "把默认模型改成第2个" → save_preference('model_index', 2)
  - "默认升2调" → save_preference('key_shift', 2)
  
  ---
  
  #### get_recommendation - 获取智能推荐
  **基于历史记录推荐最佳配置！**
  
  **参数：**
  - song_name (string, 可选): 计划翻唱的歌曲名
  
  **示例：**
  - "给我推荐个配置" → 显示个性化推荐
  - "翻唱《晴天》用什么配置好？" → 结合歌曲特征推荐
  
  ---
  
  #### view_my_stats - 查看个人统计
  **显示你的完整使用报告！**
  
  **无需参数**
  
  **显示内容：**
  - 总翻唱次数和最后使用时间
  - 当前偏好设置
  - 收藏歌曲列表（最近20首）
  - 偏爱歌手列表（最近10位）
  
  **示例：** "查看我的翻唱统计"
  
  ---
  
  #### clear_my_history - 清空历史数据
  **删除所有个人记录，重新开始学习！**
  
  **无需参数**
  
  **清除内容：**
  - 使用统计数据
  - 偏好设置
  - 收藏歌曲
  - 偏爱歌手记录
  
  **示例：** "清空我的翻唱历史"
  
  ---
  
  ## ⚙️ 配置选项说明
  
  ### 🔒 核心控制
  | 配置项 | 类型 | 默认值 | 说明 |
  |--------|------|--------|------|
  | enable_rvc | bool | true | **启用RVC引擎**：关闭后所有RVC相关功能（命令、LLM工具）被禁用 |
  | enable_svc | bool | true | **启用SVC引擎**：关闭后所有SVC相关功能（命令、LLM工具）被禁用 |
  | llm_force_mode | bool | false | **LLM强制模式**：开启后禁用 /rvc /svc 命令，只能通过对话点歌 |
  | enable_smart_cover | bool | true | 启用智能单步翻唱（smart_cover） |
  | enable_enhanced_context | bool | true | 启用增强上下文记忆 |
  | enable_confirm_mechanism | bool | true | 启用确认机制 |
  | enable_batch_cover | bool | true | 启用批量翻唱功能 |
  | enable_preference_learning | bool | true | 启用偏好学习与推荐 |
  
  ### 📊 默认参数
  | 配置项 | 类型 | 默认值 | 说明 |
  |--------|------|--------|------|
  | default_api_type | string | rvc | 默认翻唱类型 |
  | default_model_index | int | 1 | 默认模型序号 |
  | default_key_shift | int | 0 | 默认音调调整 |
  | max_batch_size | int | 5 | 批量翻唱最大数量 |
  | preference_storage_path | string | data/user_preferences.json | 偏好数据存储路径 |
  
  ---
  
  ## 🚀 快速开始指南
  
  ### 1️⃣ 最简单的用法（推荐新用户）
  ```
  用户：帮我翻唱《晴天》
  ↓
  LLM自动执行：smart_cover("晴天")
  ↓
  结果：✅ 已成功使用 RVC 模型生成《晴天》的翻唱版本！
  ```
  
  ### 2️⃣ 高级用户（启用偏好学习）
  ```
  用户：把默认模型改成第3个，以后都用这个
  ↓
  LLM执行：save_preference('model_index', 3)
  ↓
  结果：✅ 偏好已保存！默认模型 → 第3个
  
  （下次直接说歌名就会自动用第3个模型）
  ```
  
  ### 3️⃣ 批量翻唱（效率优先）
  ```
  用户：帮我翻唱这三首歌：《A》《B》《C》
  ↓
  LLM执行：batch_cover(["A", "B", "C"])
  ↓
  结果：📊 批量翻唱任务完成报告
         ✅ [1/3] 《A》：成功
         ✅ [2/3] 《B》：成功
         ✅ [3/3] 《C》：成功
  ```
  
  ---
  
  ## 💡 使用技巧
  
  ### 自然语言指令大全
  - ✅ "翻唱《歌名》" → 一键完成
  - ✅ "用SVC翻唱《歌名》" → 指定类型
  - ✅ "用第X个模型翻唱《歌名》" → 指定模型
  - ✅ "翻唱《歌名》，升2调" → 指定音调
  - ✅ "帮我翻唱这几首歌：《A》《B》" → 批量翻唱
  - ✅ "给我推荐个配置" → 智能推荐
  - ✅ "查看我的统计" → 个人报告
  - ✅ "把默认改成SVC" → 保存偏好
  - ✅ "就这个/换一个/确定/取消" → 确认机制
  
  ---
  
  ## 📝 版本更新日志
  
  ### v2.5.0 (当前版本) - 🎵 F0音高算法配置
  - **RVC F0配置**：新增 `f0_method` 配置项，支持 rmvpe/harvest/crepe/pm 四种音高提取算法，遇到电音人声跑调时可切换为 harvest。
  - **SVC F0配置**：新增 `svc_f0_method` 配置项，支持 fcpe/rmvpe/crepe/harvest/parselmouth/dio 六种音高提取算法。
  - **子进度显示**：分离人声阶段现在会显示子进度百分比（如"分离人声 70%"），不再与总进度混淆。
  - **进度条优化**：修复了双重百分比显示问题，区分子进度和总进度。

  ### v2.4.3 - 🗣️ LLM 完工通知
  - **完工通知**：新增 `enable_llm_success_notify` 开关，后台音频生成并发送完毕后，会自动通知大语言模型，让 LLM 用其设定的人设（如猫娘）主动向用户播报“生成成功”的好消息，提升沉浸感。

  ### v2.4.2 - 🛠️ 匹配与传参优化
  - **算法重构**：改进了 `smart_cover` 智能歌手匹配算法，放弃容易出错的贪婪拦截，引入「词语命中、歌名优先、歌手加权」的多维度打分机制，大幅提高点歌准确率。
  - **参数补全**：修复了 `batch_cover` (方案D) 批量翻唱时缺失 `music_source` (音乐源) 参数传递的问题，现在支持指定从 QQ 音乐批量翻唱。
  - **繁简兼容**：优化了匹配系统对日文繁体字（如「宮」与「宫」）的兼容性。

  ### v2.4.1 - 🎯 智能匹配与进度条
  - **精准歌手匹配**：修复了自然语言点歌时 LLM 丢失歌手信息的问题，现在搜索会优先检查并命中指定的歌手版本。
  - **实时进度条**：支持截获后端的处理进度（包括分离人声和推理阶段），并实时反馈到聊天窗口。
  - **智能参数校验**：为核心工具增加了防丢失参数设计，让自动翻唱更稳定。

  ### v2.4.0 - 🔧 引擎开关
  - ✨ 新增 RVC/SVC 引擎独立开关（enable_rvc / enable_svc）
  - ✨ LLM 可自主选择推理引擎，被禁用的引擎自动提示替代方案
  - ✨ get_available_models 显示引擎启用/禁用状态
  - 🔒 所有命令和工具均受引擎开关控制
  - 🐛 修复版本号不一致问题
  
  ### v2.3.0
  - ✨ 新增方案A：智能单步翻唱 smart_cover
  - ✨ 新增方案B：增强上下文记忆
  - ✨ 新增方案C：确认机制
  - ✨ 新增方案D：批量翻唱 batch_cover
  - ✨ 新增方案E：偏好学习与推荐系统
  - 🔒 新增 LLM 强制模式开关
  - ⚙️ 所有功能均支持独立开关控制
  - 📊 新增个人统计和数据分析
  
  ### v1.1.0 - LLM 工具支持
  - 首次支持 LLM Function Calling
  - 提供 search_music、rvc_cover、svc_cover、get_available_models 工具
  
  ### v1.0.0 - 初始版本
  - 基础的命令行翻唱功能
